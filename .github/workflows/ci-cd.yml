docker:
  name: Docker Build and Push
  runs-on: ubuntu-latest
  needs: [build]
  env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
  outputs:
    image_tag: ${{ steps.set_output.outputs.image_tag }}

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: dist/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN }}

    # ❌ REMOVE metadata complexity for scan stability
    # (we keep push step same later if needed)

    # ✅ FIX 1: Build with SIMPLE TAG (important)
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        load: true

    # ✅ FIX 2: Scan LOCAL image (not ghcr path)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # ✅ FIX 3: Push SAME IMAGE (no mismatch)
    - name: Push Docker image
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # keep short tag for k8s
    - name: Set image tag output
      id: set_output
      run: echo "image_tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
